# =============================================
# QueueWise - Application Configuration
# =============================================

# Database Configuration
# Local development lo yee values use cheyyi
# Render deploy lo environment variables override avutayi
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/queuewise?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:root123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.main.allow-circular-references=true
# JWT Configuration
jwt.secret=${JWT_SECRET:queuewise-super-secret-key-for-jwt-2024-minimum-256-bits}
jwt.expiration=86400000

# OpenAI API Key (Groq also works - free)
openai.api.key=${OPENAI_KEY:your-openai-api-key-here}
openai.api.url=https://api.openai.com/v1/chat/completions

# Server Port
server.port=8080

# CORS - Frontend URL
app.cors.allowed-origins=${FRONTEND_URL:http://localhost:3000}

# Logging
logging.level.com.queuewise=DEBUG
